<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,"> <title>Schießtraining Offline</title>
    <style>
        /* (Der CSS-Teil bleibt gleich wie oben) */
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #121212; color: #e0e0e0; }
        .button-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        button { padding: 40px; font-size: 1.8rem; font-weight: bold; cursor: pointer; border: none; border-radius: 15px; background-color: #2c2c2c; color: white; border-left: 10px solid #555; }
        button:disabled { opacity: 0.3; }
        .btn-20 { border-left-color: #2ecc71; }
        .btn-10 { border-left-color: #3498db; }
        .btn-8 { border-left-color: #f1c40f; }
        .btn-6 { border-left-color: #e74c3c; }
        #status { margin-top: 40px; font-size: 1.5rem; color: #00ff00; }
    </style>
</head>
<body>
    <h1>Timer Standalone</h1>
    <div class="button-container">
        <button class="btn-20" onclick="startTimer(20)">20s</button>
        <button class="btn-10" onclick="startTimer(10)">10s</button>
        <button class="btn-8" onclick="startTimer(8)">8s</button>
        <button class="btn-6" onclick="startTimer(6)">6s</button>
    </div>
    <div id="status">Bereit</div>

    <script>
        // Die Audio-Logik bleibt identisch, da sie die Web Audio API 
        // nutzt, die in jedem modernen Browser fest eingebaut ist.
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(freq, duration, type = 'sine', volume = 0.3) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(volume, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function startTimer(seconds) {
            // Wichtig für iPhone: AudioContext muss durch User-Interaktion gestartet werden
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            document.querySelectorAll('button').forEach(b => b.disabled = true);
            
            // Ablauf wie gehabt
            document.getElementById('status').innerText = "Standby...";
            playSound(880, 0.15, 'sine', 0.2);

            setTimeout(() => {
                playSound(660, 0.1, 'sine', 0.2);
                setTimeout(() => playSound(660, 0.1, 'sine', 0.2), 200);
            }, 7000);

            setTimeout(() => {
                document.getElementById('status').innerText = "FEUER!";
                playSound(1000, 0.8, 'square', 0.3);

                setTimeout(() => {
                    document.getElementById('status').innerText = "HALT!";
                    playSound(440, 1.0, 'square', 0.3);
                    document.querySelectorAll('button').forEach(b => b.disabled = false);
                }, seconds * 1000);
            }, 14000);
        }
    </script>
</body>
</html>
